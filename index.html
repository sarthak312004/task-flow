<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task-flow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div container-box ="grid" class="container">
        <!-- Navigation Bar -->
         <div class="nav-bar">
            <div class="menu-icon">
                <div class="menu-btn"><img id="menu-img-icon" src="res/menu-icon.png" alt=""><p>Menu</p></div>
            </div>

            <h1 id="Title">Task~Flow</h1>
            <div class="options">
                <div class="option-btn">
                    <img id="options-img-icon" src="res/option-icon.png" alt=""><p>Options</p>
                </div>
            </div>
        </div>

        <!-- main body -->
            <div class="mid-container">
                <div class="counter-div">
                    <div class="time">
                        <p id="hr">00:</p>
                        <p id="min">00:</p>
                        <p id="sec">00</p>
                    </div>

                    <div class="counter-options">
                        <button id="play-pause-btn"><img src="res/play-icon.png" alt=""></button>
                        <button id="reset-btn"><img src="res/reset-icon.png" alt=""></button>
                    </div>

                </div>

                <div class="task-panel">
                    <div class="task-panel-header">
                        <input type="text" placeholder="Brushing tooth..." id="add-task-input">
                        <button id="add-task-btn">ADD</button>
                    </div>
                </div>

            </div>
    </div>
</body>
</html>
