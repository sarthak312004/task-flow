<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>task-flow</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div container-box="grid" class="container">
        <!-- Navigation Bar -->
        <div class="nav-bar">
            <div class="menu-icon">
                <div class="menu-btn"><img id="menu-img-icon" src="res/menu-icon.png" alt="">
                    <p>Menu</p>
                </div>
            </div>

            <h1 id="Title">Task~Flow</h1>
            <div class="options">
                <div class="option-btn">
                    <img id="options-img-icon" src="res/option-icon.png" alt="">
                    <p>Options</p>
                </div>
            </div>
        </div>

        <!-- main body -->
        <div class="mid-container">
            <div class="counter-div">
                <div class="time">
                    <div class="hr-div">
                        <p id="hr">0</p>
                        <p>hr</p>
                    </div>
                    <div class="min-div">
                        <p id="min">0</p>
                        <p>mn</p>
                    </div>
                    <div class="sec-div">
                        <p id="sec">0</p>
                        <p>sc</p>
                    </div>
                </div>

                <div class="counter-options">
                    <button id="play-pause-btn"><img src="res/play-icon.png" alt=""></button>
                    <!-- <button id="reset-btn"><img src="res/reset-icon.png" alt=""></button> -->
                </div>

            </div>

            <div class="task-panel">
                <div class="task-panel-header">
                    <input type="text" name="addtask" placeholder="Brushing teeth..." id="add-task-input">
                    <button id="add-task-btn">ADD</button>
                </div>

                <div class="task-panel-content">

                    <div id="task-div">
                        <div class="taskname-timing-box">
                            <input type="checkbox" name="check" id="checkTask">
                            <div class="taskname-timing">
                                <p>Task name</p>
                                <p>Given Time</p>
                            </div>
                        </div>
                        <div class="select-deselect-trash">
                            <p id="select-deselect">Select</p>
                            <button><img src="res/trash-icon.png" alt=""></button>
                        </div>
                    </div>

                </div>
            </div>

            <div class="dropdown-optio-container">
                <h4>All Tasks</h4>
                <h4>Completed</h4>
                <h4>In Progress</h4>
            </div>

            <div class="dropdown-menu-container">
                <h4>Theme</h4>
                <h4>Sign up</h4>
                <h4>Help</h4>
            </div>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>
